name: release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  crates:
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - uses: rust-lang/crates-io-auth-action@v1.0.4
        id: cratesio-auth
      - name: Publish crates
        run: |
          if ! git show --exit-code -G^version crates/syntax/Cargo.toml; then
            cargo publish -p wat_syntax
          fi
          if ! git show --exit-code -G^version crates/parser/Cargo.toml; then
            cargo publish -p wat_parser
          fi
          if ! git show --exit-code -G^version crates/formatter/Cargo.toml; then
            cargo publish -p wat_formatter
          fi
          if ! git show --exit-code -G^version crates/service/Cargo.toml; then
            cargo publish -p wat_service
          fi
          cargo publish -p wat_server
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.cratesio-auth.outputs.token }}

  draft-github:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: gh release create ${{ github.ref_name }} --verify-tag --draft --title ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  github:
    needs: draft-github
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64-macos
            host: macos-latest
            target: x86_64-apple-darwin
          - name: arm64-macos
            host: macos-latest
            target: aarch64-apple-darwin
          - name: x86_64-linux
            host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: arm64-linux
            host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - name: x86_64-alpine
            host: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - name: arm64-alpine
            host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - name: x86_64-windows
            host: windows-latest
            target: x86_64-pc-windows-gnu
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - shell: pwsh
        run: |
          cargo build --target=${{ matrix.target }} --release
          if (Test-Path ./target/${{ matrix.target }}/release/wat_server.exe) {
            7z a wat_server-${{ matrix.name }}.zip ./target/${{ matrix.target }}/release/wat_server.exe
          }
          elseif (Test-Path ./target/${{ matrix.target }}/release/wat_server) {
            7z a wat_server-${{ matrix.name }}.zip ./target/${{ matrix.target }}/release/wat_server
          }
      - run: gh release upload ${{ github.ref_name }} wat_server-${{ matrix.name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/attest@v4
        with:
          subject-path: wat_server-${{ matrix.name }}.zip

  npm:
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup target add wasm32-unknown-unknown
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen@0.2.120
      - run: |
          cargo build -p binding_wasm --target wasm32-unknown-unknown --release
          wasm-bindgen --out-dir=bindings/pkg --target=web --omit-default-module-path target/wasm32-unknown-unknown/release/binding_wasm.wasm
      - uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: true
      - uses: actions/setup-node@v6
        with:
          registry-url: "https://registry.npmjs.org"
          node-version: "24"
      - run: pnpm -F=@wasm-language-tools/wasm publish --no-git-checks

  vscode:
    needs: [npm, github]
    runs-on: ubuntu-latest
    steps:
      - shell: pwsh
        run: |
          $headers = @{
            "Accept" = "application/vnd.github+json"
            "Authorization" = "Bearer ${{ secrets.VSCODE_EXT_REPO_TOKEN }}"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $body = @{
            "ref" = "main"
            "inputs" = @{
              "semver" = "minor"
            }
          } | ConvertTo-Json
          Invoke-WebRequest -Uri "https://api.github.com/repos/g-plane/vscode-wasm/actions/workflows/release.yml/dispatches" -Method Post -Headers $headers -Body $body
